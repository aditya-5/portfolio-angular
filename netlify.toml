[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/draco/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect /runna to Vercel deployment
[[redirects]]
  from = "/runna"
  to = "https://runna-strava.vercel.app"
  status = 301
  force = true

[[redirects]]
  from = "/runna/*"
  to = "https://runna-strava.vercel.app/:splat"
  status = 301
  force = true
